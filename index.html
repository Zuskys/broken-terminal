<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>BrokenTerminal</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Share+Tech+Mono&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body>
		<main>
			<section class="effect" id="main-menu">
				<div class="menu-content">
					<h1>BROKEN TERMINAL</h1>
					<p>ACCESS DENIED - AUTHENTICATION REQUIRED</p>
					<div class="menu-btn">
						<button id="btn-play">NEW SESSION</button>
						<button id="btn-continue">CONTINUE</button>
						<button id="btn-options">OPTIONS</button>
					</div>
				</div>
			</section>
			<section class="effect hidden" id="game">
				<div class="border" id="panel-words">
					<div id="attempts-cont">
						<p>Attempts:</p>
						<div id="attempts-style"></div>
					</div>
					<div id="word-list"></div>
				</div>
				<div id="panel-history">
					<div id="result-history"></div>
				</div>
			</section>
		</main>
	</body>

	<script type="module" src="src/main.js"></script>
</html>
